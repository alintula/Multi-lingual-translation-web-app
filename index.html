<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilingual Translation App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">

        <!-- Dark Mode Toggle -->
        <div class="header-top">
            <h1 class="app-title">Translate</h1>
            <button id="themeToggle" class="theme-btn" title="Toggle dark mode">🌙</button>
        </div>

        <!-- Language Controls -->
        <header>
            <div class="lang-controls">
                <select id="sourceLang">
                    <option value="autodetect">Detect Language</option>
                    <option value="en" selected>English</option>
                    <option value="fr">French</option>
                    <option value="es">Spanish</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ar">Arabic</option>
                    <option value="zh-CN">Chinese (Simplified)</option>
                    <option value="ja">Japanese</option>
                </select>

                <button id="swapBtn" title="Switch Languages">⇄</button>

                <select id="targetLang">
                    <option value="en">English</option>
                    <option value="fr" selected>French</option>
                    <option value="es">Spanish</option>
                    <option value="de">German</option>
                    <option value="it">Italian</option>
                    <option value="pt">Portuguese</option>
                    <option value="ar">Arabic</option>
                    <option value="zh-CN">Chinese (Simplified)</option>
                    <option value="ja">Japanese</option>
                </select>
            </div>
        </header>

        <!-- Error Banner -->
        <div id="errorMsg" class="error-msg" style="display:none;"></div>

        <!-- Translation Cards -->
        <main class="translation-grid">
            <!-- Input Card -->
            <div class="card">
                <label class="card-label">Input</label>
                <textarea id="inputText" maxlength="500">Hello, how are you</textarea>
                <div class="card-footer">
                    <div class="icon-actions">
                        <button onclick="speak('inputText')">🔊 Listen</button>
                        <button onclick="copyText('inputText')">📋 Copy</button>
                    </div>
                    <span id="charCount">18/500</span>
                </div>
            </div>

            <!-- Output Card -->
            <div class="card output-card">
                <label class="card-label">Output</label>
                <!-- Loading spinner inside output card -->
                <div id="loader" class="loader" style="display:none;">
                    <div class="spinner"></div>
                    <span>Translating…</span>
                </div>
                <textarea id="outputText" readonly placeholder="Translation will appear here…"></textarea>
                <div class="card-footer">
                    <div class="icon-actions">
                        <button onclick="speak('outputText')">🔊 Listen</button>
                        <button onclick="copyText('outputText')">📋 Copy</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Translate Button -->
        <footer>
            <button id="translateBtn">Translate</button>
        </footer>

    </div>
    <script src="script.js"></script>
</body>
</html>
